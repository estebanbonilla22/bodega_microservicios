server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**,/users/**
        - id: catalog-service
          uri: lb://catalog-service
          predicates:
            - Path=/products/**,/categories/**
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/stock/**,/movements/**
        - id: dispatch-service
          uri: lb://dispatch-service
          predicates:
            - Path=/dispatches/**

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info
