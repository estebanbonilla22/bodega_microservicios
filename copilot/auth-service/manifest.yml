name: auth-service
type: Backend Service

image:
  build:
    dockerfile: auth-service/Dockerfile
    context: .
  port: 8081

network:
  connect: true
  vpc:
    placement: 'private'

cpu: 256
memory: 512
count: 1

variables:
  EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka/
  SPRING_DATASOURCE_USERNAME: bodegaadmin
  SPRING_DATASOURCE_URL:
    from_cfn: ${COPILOT_APPLICATION_NAME}-${COPILOT_ENVIRONMENT_NAME}-BodegaJdbcAuthDb

secrets:
  SPRING_DATASOURCE_PASSWORD:
    secretsmanager: '${COPILOT_APPLICATION_NAME}-${COPILOT_ENVIRONMENT_NAME}-bodega-pg-master:password::'
